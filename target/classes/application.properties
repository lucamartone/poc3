spring.application.name=connectivity-service

server.port=8080

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

connectivity.socket.connect-timeout-ms=3000 
connectivity.socket.read-timeout-ms=3000

# H2 datasource
spring.datasource.url=jdbc:h2:mem:connectivitydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# SQL initialization
spring.sql.init.mode=never

# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
